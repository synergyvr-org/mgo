<div class="video-player video {{ .Get "border" | default "" }}">
  <video>
    <source src="/mgo/images/{{ .Get "name" }}.{{.Get "type" | default "mp4" }}" type="video/{{.Get "type" | default "mp4" }}">
    Your browser does not support this video.
  </video>
  <div class="video-controls">
    <button class="btn-play" aria-label="Play">
      <svg class="icon-play" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      <svg class="icon-pause" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
    </button>
    <div class="progress-bar">
      <div class="progress-buffered"></div>
      <div class="progress-filled"></div>
    </div>
    <span class="time">0:00 / 0:00</span>
    <button class="btn-mute" aria-label="Mute">
      <svg class="icon-unmuted" viewBox="0 0 24 24"><polygon points="6,9 2,9 2,15 6,15 11,20 11,4"/><path d="M14,9.5 Q17,12 14,14.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M16,7 Q21,12 16,17" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
      <svg class="icon-muted" viewBox="0 0 24 24" style="display:none"><polygon points="6,9 2,9 2,15 6,15 11,20 11,4"/><line x1="15" y1="9" x2="21" y2="15" stroke="currentColor" stroke-width="1.5"/><line x1="21" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="1.5"/></svg>
    </button>
    <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="1">
    <a class="btn-download" href="https://daveystrus.com/mgo/images/higgs-reading.mp4" download aria-label="Download">
      <svg viewBox="0 0 24 24"><path d="M12,3 L12,16 M12,16 L7,11 M12,16 L17,11" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M4,20 L20,20" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
    </a>
    <button class="btn-fullscreen" aria-label="Fullscreen">
      <svg viewBox="0 0 24 24"><path d="M3,3 L9,3 M3,3 L3,9 M21,3 L15,3 M21,3 L21,9 M3,21 L9,21 M3,21 L3,15 M21,21 L15,21 M21,21 L21,15" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
    </button>
  </div>
  <div class="caption">{{ .Inner | .Page.RenderString }}</div>
</div>
